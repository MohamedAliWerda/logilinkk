<aside class="sidebar" [class.collapsed]="!isOpen">
    <div class="sidebar-header">
        <img src="/isgi-sfax-logo-.png" alt="ISGI" class="sidebar-isgi-logo" />
    </div>

    <nav class="sidebar-nav" [@listAnimation]="menuItems.length">
        <ng-container *ngFor="let item of menuItems">
            <ng-container *ngIf="item.key !== 'deconnexion'">
                <a class="nav-item"
                   [routerLink]="item.route"
                   routerLinkActive="active"
                   [routerLinkActiveOptions]="{ exact: item.exact }"
                   (click)="navigateTo(item.route)">
                    <span class="nav-icon">
                        <ng-container [ngSwitch]="item.key">

                            <svg *ngSwitchCase="'offres'" width="17" height="17" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="7" width="20" height="14" rx="2"/>
                                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                            </svg>

                            <svg *ngSwitchCase="'candidatures'" width="17" height="17" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>

                            <svg *ngSwitchCase="'profil'" width="17" height="17" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>

                        </ng-container>
                    </span>
                    <span class="nav-label">{{ item.label }}</span>
                </a>
            </ng-container>
        </ng-container>

        <div class="profile-block">
            <ng-container *ngFor="let item of menuItems">
                <a *ngIf="item.key === 'deconnexion'" class="nav-item"
                   [routerLink]="item.route"
                   routerLinkActive="active"
                   [routerLinkActiveOptions]="{ exact: item.exact }"
                   (click)="navigateTo(item.route)">
                    <span class="nav-icon">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </span>
                    <span class="nav-label">{{ item.label }}</span>
                </a>
            </ng-container>

            <div class="djagora-footer">
                <img src="djagora-removebg-preview.png" alt="Djagora" class="djagora-logo" />
                <p class="djagora-text">Cette plateforme est générée par la Fondation Djagora dans le cadre du projet PEJC 2025</p>
            </div>
        </div>
    </nav>
</aside>
