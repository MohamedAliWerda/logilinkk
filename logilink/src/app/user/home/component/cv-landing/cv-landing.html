<section class="cv-landing" aria-labelledby="cv-landing-title">
    <div class="cv-landing__card">
        <p class="cv-landing__eyebrow">Bienvenue</p>
        <h1 id="cv-landing-title" class="cv-landing__title">Creez votre CV ATS pour demarrer</h1>
        <p class="cv-landing__description">
            Votre tableau de bord sera disponible des que votre CV ATS est enregistre.
        </p>

        @if (isCheckingCv()) {
        <p class="cv-landing__status" aria-live="polite">Verification de votre CV en cours...</p>
        } @else {
        <button type="button" class="cv-landing__cta" (click)="goToCvAts()">
        Creer mon CV
      </button> } @if (checkError()) {
        <p class="cv-landing__error" role="alert">{{ checkError() }}</p>
        }
    </div>
</section>
