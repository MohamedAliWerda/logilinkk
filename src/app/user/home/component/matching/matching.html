<div class="dashboard-content">
  <section class="matching-section">
      <div class="matching-head">
        <div>
          <h2>Mise en relation avec les entreprises</h2>
          <p>Entreprises&nbsp;correspondant&nbsp;à&nbsp;vos&nbsp;compétences&nbsp;et&nbsp;votre&nbsp;profil</p>
        </div>
        <div class="matching-search-wrap">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" placeholder="Rechercher..." [(ngModel)]="matchingSearch" />
        </div>
      </div>

      <div class="matching-grid">
        <article class="matching-card" *ngFor="let c of filteredMatchingCompanies">
          <div class="matching-card-top">
            <div class="company-head">
              <span class="company-square-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 21h18"></path>
                  <path d="M5 21V7l8-4v18"></path>
                  <path d="M19 21V11l-6-4"></path>
                </svg>
              </span>
              <div>
                <h3>{{ c.name }}</h3>
                <p class="company-location">{{ c.location }}</p>
              </div>
            </div>
            <div class="score-box">
              <span class="score-value">★ {{ c.score }}%</span>
              <span class="score-label">match</span>
            </div>
          </div>

          <p class="company-desc">{{ c.description }}</p>

          <div class="tag-row">
            <span class="tag-chip" *ngFor="let t of c.tags">{{ t }}</span>
          </div>

          <div class="matching-divider"></div>

          <div class="meta-row">
            <span>{{ c.sector }}</span>
            <span>{{ c.employees }}</span>
            <span class="stage-chip">{{ c.stage }}</span>
          </div>

          <button class="detail-btn">Voir le détail</button>
        </article>
      </div>
  </section>
</div>
