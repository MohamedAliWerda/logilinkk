<header class="top-navbar" role="banner">
  <div class="navbar-left">
    <button class="menu-btn" type="button" aria-label="Menu" (click)="onMenuToggle()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <img class="brand-logo" [src]="logoSrc" [alt]="logoAlt" />
  </div>

  <div class="navbar-right">
    <div class="user-pill" aria-label="Utilisateur connecte">
      <span class="user-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 1 0-16 0"></path>
          <circle cx="12" cy="8" r="4"></circle>
        </svg>
      </span>
      <span class="user-name">{{ userName }}</span>
    </div>

    <button class="logout-icon-btn" type="button" (click)="onLogout()" aria-label="Deconnexion">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
</header>
