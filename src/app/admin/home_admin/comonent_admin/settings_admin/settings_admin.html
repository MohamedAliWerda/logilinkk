<main class="main-area">

    <header class="dashboard-header" aria-label="Paramètres">
      <h1>PARAMÈTRES</h1>
      <p>Configuration générale de la plateforme</p>
    </header>

    <section class="settings-card">
        <h2 class="section-title">
          <span class="title-icon">🛡</span> Profil administrateur
        </h2>
        <p class="section-subtitle">Informations sur votre compte administrateur</p>

        <div class="grid-2">
            <label class="field">
          <span>Nom complet</span>
          <input type="text" [(ngModel)]="admin.fullName" />
        </label>
            <label class="field">
          <span>Adresse e-mail</span>
          <input type="email" [(ngModel)]="admin.email" />
        </label>
            <label class="field">
          <span>Téléphone</span>
          <input type="text" [(ngModel)]="admin.phone" />
        </label>
            <label class="field">
          <span>Rôle</span>
          <input type="text" [(ngModel)]="admin.role" disabled />
        </label>
        </div>
    </section>

</main>
