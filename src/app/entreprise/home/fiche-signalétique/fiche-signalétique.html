<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <div class="section-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Fiche signalétique
    </div>
    <h1>Fiche signalétique</h1>
    <p class="page-subtitle">Gérez les informations de votre entreprise.</p>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    Chargement du profil...
  </div>

  <div *ngIf="!isLoading">

    <!-- Avatar + nom -->
    <div class="profil-card avatar-card">
      <div class="avatar">{{ getInitials() }}</div>
      <div class="avatar-info">
        <h2>{{ profil?.nomEntreprise }}</h2>
        <p>{{ profil?.email }}</p>
      </div>
      <button class="btn-edit" (click)="enableEdit()" *ngIf="!isEditing">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Modifier
      </button>
      
    </div>

    <!-- Messages -->
    <div class="alert alert-success" *ngIf="successMessage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMessage }}
    </div>
    <div class="alert alert-error" *ngIf="errorMessage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Formulaire -->
    <form [formGroup]="profilForm" (ngSubmit)="saveProfil()">
      <div class="profil-card">
        

        <div class="field-group">
          <div class="field">
            <label>Dénomination sociale</label>
            <div class="input-wrapper" [class.disabled]="!isEditing">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              </svg>
              <input formControlName="nomEntreprise" [readonly]="!isEditing" placeholder="Nom de votre entreprise" />
            </div>
          </div>

          <div class="field">
            <label>Adresse e-mail</label>
            <div class="input-wrapper" [class.disabled]="!isEditing">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input formControlName="email" [readonly]="!isEditing" placeholder="email@entreprise.com" type="email" />
            </div>
          </div>
        </div>

        <div class="field-group">
          <div class="field">
            <label>Téléphone</label>
            <div class="input-wrapper" [class.disabled]="!isEditing">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <input formControlName="telephone" [readonly]="!isEditing" placeholder="+216 XX XXX XXX" />
            </div>
          </div>

          <div class="field">
            <label>Adresse</label>
            <div class="input-wrapper" [class.disabled]="!isEditing">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              <input formControlName="adresse" [readonly]="!isEditing" placeholder="Adresse de l'entreprise" />
            </div>
          </div>
        </div>

        <div class="field full-width">
          <label>Secteur d'activité</label>
          <div class="input-wrapper textarea-wrapper" [class.disabled]="!isEditing">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-top:3px;flex-shrink:0">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <textarea formControlName="description" [readonly]="!isEditing" rows="4"
              placeholder="Décrivez votre entreprise, votre secteur d'activité..."></textarea>
          </div>
        </div>
      </div>

      <!-- Boutons -->
      <div class="form-actions" *ngIf="isEditing">
        <button type="button" class="btn-annuler" (click)="cancelEdit()">Annuler</button>
        <button type="submit" class="btn-sauvegarder" [disabled]="isSaving || profilForm.invalid">
          <svg *ngIf="!isSaving" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ isSaving ? 'Enregistrement...' : 'Sauvegarder' }}
        </button>
      </div>
    </form>

  </div>
</div>
