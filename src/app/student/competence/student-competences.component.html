<div class="dashboard-layout">
  
  <app-student-sidebar [collapsed]="sidebarCollapsed" />

  <main class="main-content">
    <app-top-navbar
      [userName]="studentName"
      role="student"
      (logoutClick)="logout()"
      (menuToggle)="toggleSidebar()"
    ></app-top-navbar>

    <section class="skills-main">
      <header class="page-header">
        <h1>Mes Competences</h1>
        <p>Vue complete de vos competences acquises et celles a developper</p>
      </header>

      <div class="skills-grid">
        <div class="right-column">
          <div class="kpi-row">
            <article class="kpi-card">
              <span class="kpi-icon danger">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <line x1="12" y1="8" x2="12" y2="12" />
                  <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
              </span>
              <div>
                <div class="kpi-label">Competences manquantes</div>
                <div class="kpi-value">{{ missingCount }}</div>
              </div>
            </article>

            <article class="kpi-card">
              <span class="kpi-icon warning">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="4 14 10 8 14 12 20 6" />
                  <polyline points="20 10 20 6 16 6" />
                </svg>
              </span>
              <div>
                <div class="kpi-label">Niveau moyen</div>
                <div class="kpi-value">{{ averageLevel }}%</div>
              </div>
            </article>
          </div>

          <section class="missing-panel">
            <h2>
              <span class="panel-icon">△</span>
              Competences Manquantes
            </h2>

            <article class="missing-item" *ngFor="let item of missingCompetences">
              <div class="missing-head">
                <h3>{{ item.title }}</h3>
                <span class="level" [ngClass]="item.tone">{{ item.level }}</span>
              </div>
              <p>{{ item.source }}</p>
            </article>
          </section>
        </div>
      </div>
    </section>
  </main>
</div>
